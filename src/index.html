<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <nav class="nav" id="nav">
    <span class="nav-logo">~/portfolio</span>
    <ul class="nav-links">
      <li><a href="#hero">home</a></li>
      <li><a href="#about">about</a></li>
      <li><a href="#projects">projects</a></li>
      <li><a href="#contact">contact</a></li>
    </ul>
  </nav>

  <main>
    <!-- Each <section> is a self-contained module loaded by its own JS file -->
    <section id="hero"></section>
    <section id="about"></section>
    <section id="projects"></section>
    <section id="contact"></section>
  </main>

  <footer class="footer">
    <span>built with curiosity &amp; caffeine</span>
    <span class="footer-year" id="footer-year"></span>
  </footer>

  <!-- Config: edit this file to personalise the site -->
  <script src="js/config.js"></script>

  <!-- Core app loader — registers and mounts each section module -->
  <script src="js/app.js"></script>

  <!-- Section modules — add new ones here as your portfolio grows -->
  <script src="sections/hero.js"></script>
  <script src="sections/about.js"></script>
  <script src="sections/projects.js"></script>
  <script src="sections/contact.js"></script>
</body>
</html>
